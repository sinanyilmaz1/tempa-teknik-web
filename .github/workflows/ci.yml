name: CI

on:
  pull_request:
    branches:
      - master
      - development

jobs:
  quality:
    name: Lint, Type-check, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Nuxt
        run: npx nuxt prepare

      - name: Lint
        run: npx eslint .

      - name: Type-check
        run: npx nuxt typecheck

      - name: Build
        run: npm run build
